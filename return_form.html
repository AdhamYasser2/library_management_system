{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <h2>Return a Book</h2>
    <p>Submitting this form calls the <code>ReturnBook</code> stored procedure.</p>
    
    <form action="/return" method="POST" class="modern-form">
        <div class="form-group">
            <label for="borrow_id">Borrow ID</label>
            <input type="number" id="borrow_id" name="borrow_id" required placeholder="e.g., 12">
        </div>
        
        <button type="submit" class="btn primary-btn">Process Return</button>
    </form>
</div>
{% endblock %}
